name: Verify Neon Bay Vercel static release

on:
  pull_request:
    branches: [main]
    paths:
      - 'vercel-static/**'
      - 'scripts/verify-vercel-static.mjs'
      - 'scripts/verify-vercel-static-v16.mjs'
      - 'vercel.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-static-release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Verify browser-ready v1.6 release
        run: node --experimental-vm-modules scripts/verify-vercel-static.mjs vercel-static
