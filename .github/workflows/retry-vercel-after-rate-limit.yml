name: Retry Vercel until production succeeds

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  statuses: read

concurrency:
  group: neon-bay-vercel-retry
  cancel-in-progress: false

jobs:
  retry-production:
    runs-on: ubuntu-latest
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Inspect latest Vercel status
        id: vercel
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          sha="$(git rev-parse HEAD)"
          response="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/status")"
          latest="$(jq -c '[.statuses[] | select(.context == "Vercel")] | sort_by(.updated_at) | last // {}' <<<"$response")"
          state="$(jq -r '.state // "missing"' <<<"$latest")"
          target="$(jq -r '.target_url // ""' <<<"$latest")"
          description="$(jq -r '.description // ""' <<<"$latest")"

          echo "Commit: ${sha}"
          echo "Vercel state: ${state}"
          echo "Vercel target: ${target}"
          echo "Vercel description: ${description}"

          retry=false
          case "$state" in
            success)
              echo "Production deployment succeeded. No new deployment commit will be created."
              ;;
            pending)
              echo "A Vercel deployment is already running. Waiting for the next scheduled check."
              ;;
            failure)
              retry=true
              echo "Vercel rejected or failed the latest deployment. Triggering a fresh production attempt."
              ;;
            missing)
              commit_time="$(git show -s --format=%ct HEAD)"
              now="$(date +%s)"
              age="$((now - commit_time))"
              if (( age >= 1200 )); then
                retry=true
                echo "No Vercel status appeared after 20 minutes. Triggering a fresh production attempt."
              else
                echo "The commit is recent; waiting for Vercel to attach its status."
              fi
              ;;
            *)
              retry=true
              echo "Unknown Vercel status. Triggering a fresh production attempt."
              ;;
          esac

          echo "retry=${retry}" >> "$GITHUB_OUTPUT"

      - name: Trigger a fresh Vercel Git deployment
        if: steps.vercel.outputs.retry == 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "neon-bay-deploy-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: retry Vercel production deployment"
          git push origin HEAD:main
