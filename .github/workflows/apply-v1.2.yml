name: Apply Neon Bay v1.2

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-v1.2.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Expand v1.2 source
        shell: bash
        run: |
          cat release-v1.2-lite.part-* > /tmp/neon-v1.2.b64
          base64 --decode /tmp/neon-v1.2.b64 > /tmp/neon-v1.2.tar.xz
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name 'release-v1.2-lite.part-*' ! -name 'release-v1.2.part-*' -exec rm -rf {} +
          tar -xJf /tmp/neon-v1.2.tar.xz -C .
          rm -f release-v1.2-lite.part-* release-v1.2.part-* .github/workflows/apply-v1.2.yml

      - name: Generate original character and dialogue assets
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y espeak ffmpeg
          python3 scripts/generate-character-glb.py
          mkdir -p public/audio
          espeak -w /tmp/mara-01.wav "Coastline is changing. The old crews are nervous, and nervous people pay well."
          espeak -w /tmp/player-01.wav "You called me across the city for a nervous driver?"
          espeak -w /tmp/mara-02.wav "For the pink Sunset G T behind you. Deliver it clean and the Bay starts opening doors."
          espeak -w /tmp/mara-03.wav "One warning. The police already know that car."
          ffmpeg -y -loglevel error -i /tmp/mara-01.wav -codec:a libmp3lame -q:a 5 public/audio/mara-01.mp3
          ffmpeg -y -loglevel error -i /tmp/player-01.wav -codec:a libmp3lame -q:a 5 public/audio/player-01.mp3
          ffmpeg -y -loglevel error -i /tmp/mara-02.wav -codec:a libmp3lame -q:a 5 public/audio/mara-02.mp3
          ffmpeg -y -loglevel error -i /tmp/mara-03.wav -codec:a libmp3lame -q:a 5 public/audio/mara-03.mp3

      - name: Validate release
        run: |
          npm install
          npm test

      - name: Commit v1.2
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release Neon Bay v1.2"
          git push
