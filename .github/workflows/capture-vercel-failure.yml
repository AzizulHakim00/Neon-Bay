name: Capture Vercel deployment failure

on:
  status:

permissions:
  contents: read
  issues: write

jobs:
  capture:
    if: github.event.context == 'Vercel' && github.event.state == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Inspect and record Vercel failure details
        env:
          GH_TOKEN: ${{ github.token }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          COMMIT_SHA: ${{ github.event.sha }}
          STATUS_STATE: ${{ github.event.state }}
          STATUS_CONTEXT: ${{ github.event.context }}
          STATUS_DESCRIPTION: ${{ github.event.description }}
          STATUS_TARGET: ${{ github.event.target_url }}
        shell: bash
        run: |
          set -u
          title="Vercel deployment diagnostics"
          deployment_id=$(grep -oE 'dpl_[A-Za-z0-9]+' <<<"${STATUS_DESCRIPTION:-}" | head -n1 || true)
          inspect_output="No Vercel deployment ID was present in the status description."
          if [[ -n "$deployment_id" ]]; then
            if [[ -n "${VERCEL_TOKEN:-}" ]]; then
              inspect_output=$(npx --yes vercel@latest inspect "$deployment_id" --logs --token "$VERCEL_TOKEN" --scope azizulhakim00s-projects 2>&1 || true)
            else
              inspect_output=$(npx --yes vercel@latest inspect "$deployment_id" --logs 2>&1 || true)
            fi
          fi
          inspect_output=$(tail -c 30000 <<<"$inspect_output")
          body=$(cat <<EOF
          ## Latest Vercel failure

          - Commit: \`${COMMIT_SHA}\`
          - State: \`${STATUS_STATE}\`
          - Context: \`${STATUS_CONTEXT}\`
          - Description: ${STATUS_DESCRIPTION:-No description supplied}
          - Target: ${STATUS_TARGET:-No target supplied}
          - Deployment ID: \`${deployment_id:-not found}\`
          - Repository secret \`VERCEL_TOKEN\`: $([[ -n "${VERCEL_TOKEN:-}" ]] && echo available || echo not configured)
          - Captured: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

          ### Vercel CLI inspection

          \`\`\`text
          ${inspect_output}
          \`\`\`
          EOF
          )
          number=$(gh issue list --repo "$REPOSITORY" --state open --search "$title in:title" --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -n1)
          if [[ -n "$number" ]]; then
            gh issue comment "$number" --repo "$REPOSITORY" --body "$body"
          else
            gh issue create --repo "$REPOSITORY" --title "$title" --body "$body"
          fi
