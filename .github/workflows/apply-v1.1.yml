name: Apply Neon Bay v1.1

on:
  push:
    paths:
      - ".github/workflows/apply-v1.1.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Expand v1.1 release
        shell: bash
        run: |
          cat release-v1.1.part-* > /tmp/neon-v1.1.b64
          base64 --decode /tmp/neon-v1.1.b64 > /tmp/neon-v1.1.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name 'release-v1.1.part-*' -exec rm -rf {} +
          tar -xzf /tmp/neon-v1.1.tar.gz -C .
          rm -f release-v1.1.part-* .github/workflows/apply-v1.1.yml

      - name: Validate release
        run: |
          npm ci
          npm test

      - name: Commit v1.1
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Release Neon Bay v1.1"
          git push
